<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adaptive & Neurodivergent Learning AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #050816;
      --card-bg: #0f172a;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.2);
      --text-main: #e5e7eb;
      --text-soft: #9ca3af;
      --danger: #fb7185;
      --focus: #a855f7;
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background: radial-gradient(circle at top, #0f172a 0, #020617 45%, #000000 100%);
      color: var(--text-main);
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 64px;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 32px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.3);
    }

    .logo {
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.85rem;
      color: var(--accent);
    }

    nav {
      display: flex;
      gap: 16px;
      font-size: 0.9rem;
    }

    nav a {
      color: var(--text-soft);
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 999px;
      transition: background 0.2s, color 0.2s;
    }

    nav a:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1.4fr);
      gap: 32px;
      align-items: center;
      padding-top: 32px;
    }

    @media (max-width: 840px) {
      .hero {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    .hero-title {
      font-size: clamp(2.1rem, 3vw, 2.6rem);
      line-height: 1.15;
      margin-bottom: 12px;
    }

    .hero-highlight {
      background: radial-gradient(circle at top left, var(--accent-soft), transparent 55%);
      padding: 2px 6px;
      border-radius: 999px;
      display: inline-block;
    }

    .hero-subtitle {
      font-size: 0.99rem;
      color: var(--text-soft);
      max-width: 520px;
      margin-bottom: 20px;
    }

    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tag {
      font-size: 0.8rem;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      color: var(--text-soft);
      backdrop-filter: blur(6px);
    }

    .tag.accent {
      border-color: var(--accent);
      color: var(--accent);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--focus));
      color: #0b1120;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 12px 30px rgba(56, 189, 248, 0.35);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-soft);
      font-weight: 500;
      padding: 9px 16px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      cursor: pointer;
      font-size: 0.9rem;
    }

    .btn-secondary span {
      color: var(--accent);
    }

    .hero-visual {
      background: radial-gradient(circle at top, rgba(56, 189, 248, 0.18), rgba(15, 23, 42, 0.92));
      border-radius: 24px;
      padding: 18px 18px 16px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.7);
    }

    .hero-visual-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      font-size: 0.75rem;
      color: var(--text-soft);
    }

    .pill {
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.4);
    }

    .pill.accent {
      border-color: var(--accent);
      color: var(--accent);
    }

    .load-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      overflow: hidden;
      margin-bottom: 16px;
      border: 1px solid rgba(148, 163, 184, 0.6);
    }

    .load-bar-inner {
      height: 100%;
      width: 68%;
      background: linear-gradient(90deg, var(--danger), var(--accent));
      transition: width 0.3s ease;
    }

    .visual-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 16px;
    }

    .visual-card {
      background: rgba(15, 23, 42, 0.85);
      border-radius: 18px;
      padding: 12px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      font-size: 0.78rem;
    }

    .visual-card h3 {
      font-size: 0.8rem;
      margin: 0 0 8px;
      color: var(--accent);
    }

    .visual-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .chip {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      color: var(--text-soft);
      font-size: 0.72rem;
    }

    .chip.alert {
      border-color: var(--danger);
      color: var(--danger);
    }

    .chip.ok {
      border-color: var(--accent);
      color: var(--accent);
    }

    .visual-list {
      margin: 0;
      padding-left: 16px;
      color: var(--text-soft);
    }

    .section {
      margin-top: 40px;
    }

    .section-label {
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 0.7rem;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .section-title {
      font-size: 1.25rem;
      margin-bottom: 6px;
    }

    .section-subtitle {
      font-size: 0.9rem;
      color: var(--text-soft);
      max-width: 620px;
      margin-bottom: 18px;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .pill-row .pill {
      font-size: 0.78rem;
    }

    .columns-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    @media (max-width: 840px) {
      .columns-3 {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    .feature-card {
      background: var(--card-bg);
      border-radius: 18px;
      padding: 14px 14px 16px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      font-size: 0.86rem;
    }

    .feature-label {
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-soft);
      margin-bottom: 3px;
    }

    .feature-title {
      font-size: 0.98rem;
      margin-bottom: 6px;
      color: var(--accent);
    }

    .feature-text {
      font-size: 0.83rem;
      color: var(--text-soft);
      line-height: 1.4;
    }

    footer {
      margin-top: 40px;
      padding-top: 18px;
      border-top: 1px solid rgba(148, 163, 184, 0.3);
      font-size: 0.78rem;
      color: var(--text-soft);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 8px;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Quiz panel */
    .quiz-panel {
      margin-top: 40px;
      background: var(--card-bg);
      border-radius: 18px;
      padding: 18px 18px 20px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      display: none; /* hidden until button click */
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .quiz-category-select {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      background: #020617;
      color: var(--text-soft);
      font-size: 0.8rem;
    }

    .quiz-question {
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .quiz-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    @media (max-width: 640px) {
      .quiz-options {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    .quiz-option-btn {
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: #020617;
      color: var(--text-soft);
      font-size: 0.85rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .quiz-option-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(15, 23, 42, 0.9);
    }

    .quiz-option-btn.correct {
      border-color: #22c55e;
      color: #22c55e;
      background: rgba(22, 163, 74, 0.12);
    }

    .quiz-option-btn.wrong {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(248, 113, 113, 0.12);
    }

    .quiz-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--text-soft);
      margin-top: 6px;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      font-size: 0.76rem;
      color: var(--text-soft);
    }

    .badge.accent {
      border-color: var(--accent);
      color: var(--accent);
    }

    .quiz-next-btn {
      padding: 6px 12px;
      border-radius: 999px;
